[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_OMIT_KEYS = "VITE_OFFICE_NAME,VITE_OFFICE_LEGAL_NAME"

# Route /api/chat to the Netlify function
# MUST come before the SPA catchall below — order matters
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

# SPA fallback — serves index.html for all unmatched paths
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
